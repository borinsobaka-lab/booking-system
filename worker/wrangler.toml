name = "booking-api"
main = "worker.js"
compatibility_date = "2024-11-01"

# Некритичные переменные — прямо здесь. Секреты задаются командой
# `wrangler secret put` (см. SETUP.md) и НЕ хранятся в репозитории.
[vars]
DATA_REPO = "borinsobaka-lab/booking-system-data"
DATA_BRANCH = "main"
DATA_PATH = "data.json"
# Origin витрины (для CORS). Домен записи.
CORS_ORIGIN = "https://booking.neba.space"
# Часовой пояс салона — для правила «за сколько до сеанса» и напоминаний.
STUDIO_TZ = "Asia/Tbilisi"
# Адрес витрины — для ссылки «отменить запись» в письмах.
CLIENT_BASE_URL = "https://booking.neba.space"
# Отправитель писем — адрес на подтверждённом домене neba.space.
EMAIL_FROM = "NEBA <noreply@neba.space>"

# Cron: напоминания клиентам «за час». Каждые 10 минут проверяем ближайшие записи.
[triggers]
crons = ["*/10 * * * *"]

# Секреты (задать через wrangler secret put, не сюда):
#   DATA_TOKEN     — GitHub-токен с доступом contents:read/write к DATA_REPO
#   SESSION_SECRET — длинная случайная строка для подписи сессий
#   RESEND_API_KEY — ключ Resend (re_...). Без него письма не отправляются.
#   TEST_EMAIL     — (тест) все письма уходят на этот адрес вместо реальных
#   EMAIL_REPLY_TO — (необязательно) адрес для ответов клиентов
#   REMINDER_LEAD_MINUTES — за сколько минут напоминать (по умолчанию 60)
